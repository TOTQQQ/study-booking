spring:
  datasource:
    url: jdbc:mysql://your-server-ip:3306/study_room?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: studyroom_user
    password: your_strong_password

  redis:
    host: your-redis-host
    port: 6379
    password: your_redis_password

logging:
  level:
    com.studyroom: info
  file:
    name: logs/study-room.log
    max-size: 10MB
    max-history: 30

# 生产环境JWT过期时间（较长）
jwt:
  access-token-expire: 7200000   # 2小时
  refresh-token-expire: 604800000 # 7天

# 关闭调试模式
debug: false